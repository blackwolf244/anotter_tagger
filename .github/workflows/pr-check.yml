name: Pull Request Check

on:
    pull_request:
        branches:
            - main

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "18"
                  cache: "npm"

            - name: Install Dependencies
              run: npm install

            - name: Build Plugin
              run: npm run build

            # Add any tests here if you have them
            # - name: Run Tests
            #   run: npm test
